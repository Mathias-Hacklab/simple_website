name: Test-Pip

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      gate_status: ${{ steps.quality_gate.outputs.GATE_STATUS }}
    steps:
      - uses: actions/checkout@v3

      - name: Run Quality Gate
        id: quality_gate
        run: |
          echo "GATE_STATUS=success" >> $GITHUB_OUTPUT
          echo "Quality gate evaluation finished."

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ needs.validate.outputs.gate_status == 'success' }}
    
    steps:
      - name: Production Deployment Step
        run: |
          echo "Starting deployment..."
          bash ./scripts/critical_deploy_script.sh
          echo "Deployment sequence reached the end!"
