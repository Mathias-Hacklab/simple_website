name: Deploy Static Website CDN

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lint Source Code
        run: |
          echo "Checking formatting, syntax styles, and broken links..."
          sleep 3
          echo "Linting complete. Codebase is clean."

      - name: Generate Static Assets (Production Compile)
        run: |
          echo "Running build script (e.g., npm run build)..."
          echo "Compiling HTML, minifying Javascript, and optimizing CSS stylesheets..."
          sleep 12
          echo "Static distribution directory built: ./dist"

  deploy-cdn:
    name: Global CDN Deployment
    needs: build-frontend
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://your-github-username.github.io/your-repo-name/ # <-- Put your real GitHub Pages URL here!
    steps:
      - name: Sync Files to Production Storage
        run: |
          echo "Uploading static production assets to cloud edge storage..."
          sleep 6
          echo "Upload complete. Purging edge cache locations..."
          sleep 4
          echo "Static website is live across global edge servers!"
