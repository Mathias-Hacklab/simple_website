name: Production Asset Pipelines

on:
  push:
    branches: [ main ]

jobs:
  compile-assets:
    runs-on: ubuntu-latest
    outputs:
      release_ready: ${{ steps.set_flag.outputs.release_ready }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize Asset Workspace
        run: |
          mkdir -p dist
          echo '{"version": "1.0.0", "env": "production"}' > dist/metadata.json

      - name: Upload Metadata Artifact
        uses: actions/upload-artifact@v4
        with:
          name: metadata-artifact
          path: dist

      - name: Set Release Flag
        id: set_flag
        run: |
          echo "RELEASE_READY=true" >> $GITHUB_ENV
          echo "true" > release_ready
        outputs:
          release_ready: ${{ steps.set_flag.outputs.release_ready }}

  publish-release:
    runs-on: ubuntu-latest
    needs: compile-assets
    steps:
      - uses: actions/checkout@v4

      - name: Download Metadata Artifact
        uses: actions/download-artifact@v4
        with:
          name: metadata-artifact
          path: dist

      - name: Read Metadata File
        run: |
          cat dist/metadata.json

      - name: Evaluate Pipeline State
        run: |
          if [ "${{ needs.compile-assets.outputs.release_ready }}" = "true" ]; then
            echo "State validated. Creating GitHub Release..."
            curl -X POST -H "Authorization: token ${{ github.token }}" \
              -d '{"tag_name":"v1.0.0","name":"Release v1.0.0"}' \
              https://api.github.com/repos/${{ github.repository }}/releases
          else
            echo "Error: Release flag state not detected."
            exit 1
          fi
