name: Production Asset Pipeline

on:
  push:
    branches: [ main ]

jobs:
  compile-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize Asset Workspace
        run: |
          mkdir -p dist
          echo '{"version": "1.0.0", "env": "production"}' > dist/metadata.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Set Release Flag
        id: set_flag
        run: |
          echo "RELEASE_READY=true" >> $GITHUB_ENV

  publish-release:
    runs-on: ubuntu-latest
    needs: compile-assets
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Read Metadata File
        run: |
          cat dist/metadata.json

      - name: Evaluate Pipeline State
        run: |
          if [ "$RELEASE_READY" = "true" ]; then
            echo "State validated. Creating GitHub Release..."
            curl -X POST -H "Authorization: token ${{ github.token }}" \
              -d '{"tag_name":"v1.0.0","name":"Release v1.0.0"}' \
              https://api.github.com/repos/${{ github.repository }}/releases
          else
            echo "Error: Release flag state not detected."
            exit 1
          fi
